name: Deploy Frontend to Amazon S3

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Frontend
      env:
        VITE_API_BASE_URL: https://xy8fgewma3.ap-south-1.awsapprunner.com/api
        VITE_SOCKET_URL: https://xy8fgewma3.ap-south-1.awsapprunner.com
      run: |
        cd frontend
        npm run build

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Deploy to S3
      run: |
        aws s3 sync frontend/dist/ s3://artlancer-frontend-prod --delete

    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation --distribution-id E1LKRSIJHNS1GF --paths "/*"
