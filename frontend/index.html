<!doctype html>
<html lang="en">

<head>

  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Flip-Film | Film Talent Hiring Platform</title>

  <meta name="title" content="Flip-Film | Film Talent Hiring Platform" />

  <meta name="description"
    content="Flip-Film is a platform connecting actors, directors, editors, and film crew with hiring opportunities in the film industry. Discover jobs or hire talent easily." />

  <meta name="keywords"
    content="film jobs, hire actors, casting platform, film crew hiring, video editor jobs, director jobs, film production jobs, freelance film work" />

  <meta name="author" content="Flip-Film Team" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://theflip.in/" />

  <!-- Language -->
  <meta http-equiv="content-language" content="en" />

  <!-- Theme -->
  <meta name="theme-color" content="#24272e" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://theflip.in/" />
  <meta property="og:title" content="Flip-Film Talent Hiring Platform" />
  <meta property="og:description"
    content="Connect actors, directors, and film professionals with hiring opportunities in the film industry." />
  <meta property="og:image" content="https://theflip.in/logo.png" />

  <!-- Twitter SEO -->

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://theflip.in/" />
  <meta name="twitter:title" content="Flip-Film Talent Hiring Platform" />
  <meta name="twitter:description"
    content="Hire actors, directors, editors, and film professionals easily." />
  <meta name="twitter:image" content="https://theflip.in/logo.png" />

  <!-- Apple / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <!-- Preconnect (Performance Optimization) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Example Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- DNS Prefetch -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com">

  <!-- Structured Data (Google Rich Results) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Flip-Film",
    "url": "https://theflip.in",
    "logo": "https://theflip.in/logo.png",
    "sameAs": [
      "https://instagram.com/",
      "https://twitter.com/",
      "https://linkedin.com/"
    ]
  }
  </script>

</head>

<body bgcolor="#24272e">

  <div id="root"></div>

  <!-- React Entry -->
  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
